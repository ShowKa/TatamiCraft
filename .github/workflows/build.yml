# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture fabric-1.20.1 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Fabric 1.20.1 Artifacts
          path: fabric-1.20.1/build/libs/
      - name: capture fabric-1.21.11 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Fabric 1.21.11 Artifacts
          path: fabric-1.21.11/build/libs/
      - name: capture neoforge-1.20.1 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NeoForge 1.20.1 Artifacts
          path: neoforge-1.20.1/build/libs/
      - name: capture neoforge-1.21.11 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NeoForge 1.21.11 Artifacts
          path: neoforge-1.21.11/build/libs/
