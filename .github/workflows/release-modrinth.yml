name: Release to Modrinth

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Get mod properties
        id: mod_props
        run: |
          echo "VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Build
        run: chmod +x ./gradlew && ./gradlew build

      - name: Publish Fabric to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: 8L1DTZf2
          version: ${{ steps.mod_props.outputs.VERSION }}+fabric
          loaders: fabric
          game-versions: 1.21.11
          files: "fabric/build/libs/tatamicraft-fabric-${{ steps.mod_props.outputs.MC_VERSION }}-${{ steps.mod_props.outputs.VERSION }}.jar"
          changelog: "Release version ${{ steps.mod_props.outputs.VERSION }}"

      - name: Publish NeoForge to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: 8L1DTZf2
          version: ${{ steps.mod_props.outputs.VERSION }}+neoforge
          loaders: neoforge
          game-versions: 1.21.11
          files: "neoforge/build/libs/tatamicraft-neoforge-${{ steps.mod_props.outputs.MC_VERSION }}-${{ steps.mod_props.outputs.VERSION }}.jar"
          changelog: "Release version ${{ steps.mod_props.outputs.VERSION }}"
