name: Release to CurseForge

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Get mod properties
        id: mod_props
        run: |
          echo "VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT
          echo "MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Build
        run: chmod +x ./gradlew && ./gradlew build

      - name: Publish Fabric to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_TOKEN }}
          project_id: 1483308
          game_endpoint: minecraft
          file_path: fabric/build/libs/tatamicraft-fabric-${{ steps.mod_props.outputs.MC_VERSION }}-${{ steps.mod_props.outputs.VERSION }}.jar
          display_name: TatamiCraft ${{ steps.mod_props.outputs.VERSION }} (Fabric)
          game_versions: Minecraft 1.21:1.21.11,Java 21,Fabric
          changelog: Release version ${{ steps.mod_props.outputs.VERSION }}
          changelog_type: text

      - name: Publish NeoForge to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_TOKEN }}
          project_id: 1483308
          game_endpoint: minecraft
          file_path: neoforge/build/libs/tatamicraft-neoforge-${{ steps.mod_props.outputs.MC_VERSION }}-${{ steps.mod_props.outputs.VERSION }}.jar
          display_name: TatamiCraft ${{ steps.mod_props.outputs.VERSION }} (NeoForge)
          game_versions: Minecraft 1.21:1.21.11,Java 21,NeoForge
          changelog: Release version ${{ steps.mod_props.outputs.VERSION }}
          changelog_type: text
