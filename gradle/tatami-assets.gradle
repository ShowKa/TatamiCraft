import groovy.json.JsonOutput

/**
 * 畳ブロックのカラーバリエーション用 JSON アセットをビルド時に自動生成する Gradle スクリプト。
 *
 * 色を追加する場合は、このファイルの tatamiColors リストと
 * src/main/kotlin/com/showka/objects/TatamiColor.kt の両方を更新してください。
 */

// ── カラー定義 ─────────────────────────────────────────
def tatamiColors = [
    [id: 'red',          en: 'Crimson Red',    ja: '紅色'],
    [id: 'orange',       en: 'Apricot Orange', ja: '杏色'],
    [id: 'peach',        en: 'Peach',          ja: '桃色'],
    [id: 'yellow',       en: 'Mustard Yellow', ja: '芥子色'],
    [id: 'green',        en: 'Light Green',    ja: '若竹色'],
    [id: 'sky_blue',     en: 'Sky Blue',       ja: '空色'],
    [id: 'purple',       en: 'Mauve Purple',   ja: '藤色'],
    [id: 'grayish_pink', en: 'Grayish Pink',   ja: '灰桜色'],
    [id: 'milk_white',   en: 'Milk White',     ja: '乳白色'],
    [id: 'light_brown',  en: 'Light Brown',    ja: '白茶色'],
    [id: 'walnut',       en: 'Walnut',         ja: '胡桃色'],
]

def MOD_ID = 'tatamicraft'

// Detect MC version from project name for version-aware asset generation
def projectMcVersion = project.name.contains('-') ? project.name.replaceFirst(/^[^-]+-/, '') : ''
def mcMajor = projectMcVersion ? (projectMcVersion.tokenize('.').take(2).join('.') as BigDecimal) : 99
def isLegacyFormat = mcMajor < 1.21

// ── 出力先 ────────────────────────────────────────────
def generatedDir = layout.buildDirectory.dir('generated-tatami-resources')

// ── ユーティリティ ────────────────────────────────────
/** JSON をファイルに書き出す */
def writeJson(File baseDir, String relPath, Object data) {
    def file = new File(baseDir, relPath)
    file.parentFile.mkdirs()
    file.text = JsonOutput.prettyPrint(JsonOutput.toJson(data)) + '\n'
}

// ── Blockstate 生成 ───────────────────────────────────
/**
 * 畳パーツ (tatami_part / tatami_half_part) の blockstate JSON を生成する。
 *
 * @param partCount パーツ数 (tatami_part=8, tatami_half_part=4)
 */
def generateBlockstate(File baseDir, String modId, String prefix, String type, int partCount) {
    def variants = new LinkedHashMap()
    def facings = [
        [name: 'north', y: null],
        [name: 'east',  y: 90],
        [name: 'south', y: 180],
        [name: 'west',  y: 270],
    ]

    facings.each { facing ->
        [false, true].each { mirrored ->
            (0..<partCount).each { part ->
                def side
                if (part % 2 == 0) {
                    side = mirrored ? 'right' : 'left'
                } else {
                    side = mirrored ? 'left' : 'right'
                }

                def key = "facing=${facing.name},mirrored=${mirrored},part=${part}"
                def value = new LinkedHashMap()
                value.model = "${modId}:block/${prefix}${type}_${side}"
                if (facing.y != null) {
                    value.y = facing.y
                }
                variants[key] = value
            }
        }
    }

    writeJson(baseDir, "assets/${modId}/blockstates/${prefix}${type}.json", [variants: variants])
}

// ── Block Model 生成 ──────────────────────────────────
/**
 * 畳パーツの block model JSON を生成する。
 *
 * @param side      "left" or "right"
 * @param rotation  上面テクスチャの回転角 (left=270, right=90)
 */
def generateBlockModel(File baseDir, String modId, String prefix, String type, String side, int rotation, String textureSuffix) {
    def texture = "${modId}:block/tatami_block${textureSuffix}"
    def data = new LinkedHashMap()
    data.textures = new LinkedHashMap([
        particle: texture,
        top:      texture,
        bottom:   texture,
        side:     texture,
    ])
    data.elements = [
        [
            from: [0, 0, 0],
            to:   [16, 1, 16],
            faces: new LinkedHashMap([
                down:  [texture: '#bottom', cullface: 'down'],
                up:    [texture: '#top', rotation: rotation],
                north: [texture: '#side', cullface: 'north'],
                south: [texture: '#side', cullface: 'south'],
                west:  [texture: '#side', cullface: 'west'],
                east:  [texture: '#side', cullface: 'east'],
            ]),
        ]
    ]
    writeJson(baseDir, "assets/${modId}/models/block/${prefix}${type}_${side}.json", data)
}

// ── Item Model 生成 ───────────────────────────────────
/**
 * アイテムモデル JSON (models/item/) を生成する。
 *
 * @param itemType "tatami" or "tatami_half"
 */
def generateItemModel(File baseDir, String modId, String prefix, String itemType, String textureSuffix) {
    def textureName = (itemType == 'tatami') ? 'tatami_item' : 'tatami_half_item'
    def data = new LinkedHashMap([
        parent: 'minecraft:item/generated',
        textures: [
            layer0: "${modId}:item/${textureName}${textureSuffix}",
        ]
    ])
    writeJson(baseDir, "assets/${modId}/models/item/${prefix}${itemType}.json", data)
}

// ── Item Definition 生成 ──────────────────────────────
/**
 * アイテム定義 JSON (items/) を生成する。
 */
def generateItemDefinition(File baseDir, String modId, String prefix, String itemType) {
    def data = [
        model: [
            type:  'minecraft:model',
            model: "${modId}:item/${prefix}${itemType}",
        ]
    ]
    writeJson(baseDir, "assets/${modId}/items/${prefix}${itemType}.json", data)
}

// ── Loot Table 生成 ───────────────────────────────────
/**
 * ルートテーブル JSON を生成する（空プール — ドロップは Block コードで制御）。
 */
def generateLootTable(File baseDir, String modId, String prefix, String blockType, boolean legacy) {
    def data = new LinkedHashMap([
        type:  'minecraft:block',
        pools: [],
    ])
    def lootDir = legacy ? 'loot_tables' : 'loot_table'
    writeJson(baseDir, "data/${modId}/${lootDir}/blocks/${prefix}${blockType}.json", data)
}

// ── Fusuma 生成 ───────────────────────────────────────

// ── Fusuma カラー定義 ──────────────────────────────────
def fusumaColors = [
    [id: 'grayish_pink', en: 'Grayish Pink', ja: '灰桜色'],
    [id: 'milk_white',   en: 'Milk White',   ja: '乳白色'],
    [id: 'light_brown',  en: 'Light Brown',  ja: '白茶色'],
    [id: 'walnut',       en: 'Walnut',       ja: '胡桃色'],
]

/** channel の z 座標ペアを返す (inner=10..13, outer=13..16) */
def fusumaZRange(String s, boolean flip) {
    boolean outer = (s == 'sr' && !flip) || (s == 'sl' && flip)
    return outer ? [13, 16] : [10, 13]
}

/**
 * タイル位置 (s, px, py) に対応するテクスチャ名を返す。
 * 3種類のタイル:
 *   corner     (2辺フレーム、引手なし) — 上下行の全ポジション
 *   edge       (1辺フレーム+引手)     — 外列中段 (sl_x0_y1, sr_x1_y1)
 *   edge_plain (1辺フレーム、引手なし) — 内列中段 (sl_x1_y1, sr_x0_y1)
 */
def fusumaTexForTile(String modId, String s, int px, int py, String texSuffix = '') {
    if (py != 1) return "${modId}:block/fusuma_tile_corner${texSuffix}"
    boolean outer = (s == 'sl' && px == 0) || (s == 'sr' && px == 1)
    return outer ? "${modId}:block/fusuma_tile_edge${texSuffix}"
                 : "${modId}:block/fusuma_tile_edge_plain${texSuffix}"
}

/**
 * タイル位置 (s, px, py) に対する south フェースの UV 回転角 (0/90/180/270°) を返す。
 *
 * Minecraft UV rotation の変換則 (rotation: 90 → UV を 90°CW 回転):
 *   face-TOP   ← texture-LEFT
 *   face-RIGHT ← texture-TOP
 *   face-BOTTOM← texture-RIGHT
 *   face-LEFT  ← texture-BOTTOM
 *
 * corner テクスチャ: フレームが TOP+LEFT にある
 *   0°→TL, 90°→TR, 180°→BR, 270°→BL
 * edge テクスチャ: フレームが LEFT にある
 *   0°→LEFT, 90°→TOP, 180°→RIGHT, 270°→BOTTOM
 */
def fusumaRotForTile(String s, int px, int py) {
    if (py == 2) {
        // 上行: px=0→TL(0°), px=1→TR(90°)
        return (px == 0) ? 0 : 90
    } else if (py == 0) {
        // 下行: px=0→BL(270°), px=1→BR(180°)
        return (px == 0) ? 270 : 180
    } else {
        // 中段
        if (s == 'sl' && px == 0) return 0    // 左外辺 (引手)
        if (s == 'sl' && px == 1) return 180  // 右内仕切り
        if (s == 'sr' && px == 0) return 0    // 左内仕切り
        return 180                             // 右外辺 (引手)
    }
}

/** 全フェース定義を生成。south の UV 回転角を受け取り north は対称的に補正する。 */
def fusumaFaces(String frontKey, String backKey, int southRot) {
    int northRot = (360 - southRot) % 360
    def southFace = new LinkedHashMap([texture: "#${frontKey}", uv: [0, 0, 16, 16]])
    if (southRot != 0) southFace.rotation = southRot
    def northFace = new LinkedHashMap([texture: "#${backKey}", uv: [16, 0, 0, 16]])
    if (northRot != 0) northFace.rotation = northRot
    return new LinkedHashMap([
        north: northFace,
        south: southFace,
        east:  [texture: '#edge', uv: [ 0, 0,  3, 16]],
        west:  [texture: '#edge', uv: [ 0, 0,  3, 16]],
        up:    [texture: '#edge', uv: [ 0, 0, 16,  3]],
        down:  [texture: '#edge', uv: [ 0, 0, 16,  3]],
    ])
}

/**
 * 閉時ブロックモデル ({colorPrefix}fusuma_part_closed_{s}[_flip]_x{px}_y{py}.json) を生成
 */
def generateFusumaClosedModel(File baseDir, String modId, String colorPrefix = '', String s, boolean flip, int px, int py, String texSuffix = '') {
    def z = fusumaZRange(s, flip)
    def flipStr = flip ? '_flip' : ''
    def tex = fusumaTexForTile(modId, s, px, py, texSuffix)
    def rot = fusumaRotForTile(s, px, py)
    def data = new LinkedHashMap([
        textures: new LinkedHashMap([
            particle: tex, front: tex, back: tex,
            edge: "${modId}:block/fusuma_edge",
        ]),
        elements: [[
            from: [0, 0, z[0]], to: [16, 16, z[1]],
            faces: fusumaFaces('front', 'back', rot),
        ]],
    ])
    writeJson(baseDir, "assets/${modId}/models/block/${colorPrefix}fusuma_part_closed_${s}${flipStr}_x${px}_y${py}.json", data)
}

/**
 * オーバーラップモデル ({colorPrefix}fusuma_part_overlap_{s}[_flip]_x{px}_y{py}.json) を生成
 * 自分のパネルが残り、相手のパネルが横から入り込んでいる状態。
 */
def generateFusumaOverlapModel(File baseDir, String modId, String colorPrefix = '', String s, boolean flip, int px, int py, String texSuffix = '') {
    def other = (s == 'sl') ? 'sr' : 'sl'
    def flipStr = flip ? '_flip' : ''
    def ownZ   = fusumaZRange(s, flip)
    def otherZ = (ownZ[0] == 10) ? [13, 16] : [10, 13]
    def xOff   = (s == 'sl') ? 4 : -4
    def ownTex   = fusumaTexForTile(modId, s, px, py, texSuffix)
    def otherTex = fusumaTexForTile(modId, other, px, py, texSuffix)
    def ownRot   = fusumaRotForTile(s, px, py)
    def otherRot = fusumaRotForTile(other, px, py)
    def data = new LinkedHashMap([
        textures: new LinkedHashMap([
            particle: ownTex,
            front_l: ownTex, back_l: ownTex,
            front_r: otherTex, back_r: otherTex,
            edge: "${modId}:block/fusuma_edge",
        ]),
        elements: [
            [from: [0,    0, ownZ[0]],   to: [16,    16, ownZ[1]],   faces: fusumaFaces('front_l', 'back_l', ownRot)],
            [from: [xOff, 0, otherZ[0]], to: [xOff + 16, 16, otherZ[1]], faces: fusumaFaces('front_r', 'back_r', otherRot)],
        ],
    ])
    writeJson(baseDir, "assets/${modId}/models/block/${colorPrefix}fusuma_part_overlap_${s}${flipStr}_x${px}_y${py}.json", data)
}

/** 不可視モデル (fusuma_part_invisible.json) を生成 */
def generateFusumaInvisibleModel(File baseDir, String modId) {
    writeJson(baseDir, "assets/${modId}/models/block/fusuma_part_invisible.json", [elements: []])
}

/** Blockstate JSON ({colorPrefix}fusuma_part.json) を生成 — 288 バリアント */
def generateFusumaBlockstate(File baseDir, String modId, String colorPrefix = '') {
    def variants = new LinkedHashMap()
    def facings = [
        [name: 'north', y: null],
        [name: 'east',  y: 90],
        [name: 'south', y: 180],
        [name: 'west',  y: 270],
    ]
    ['left', 'right'].each { side ->
        def s = (side == 'left') ? 'sl' : 'sr'
        facings.each { facing ->
            [false, true].each { flipped ->
                def flipStr = flipped ? '_flip' : ''
                [0, 1].each { px ->
                    [0, 1, 2].each { py ->
                        ['closed', 'left_open', 'right_open'].each { ds ->
                            def key = "door_state=${ds},facing=${facing.name},flipped_horizontal=${flipped},part_x=${px},part_y=${py},side=${side}"
                            String modelPath
                            switch (ds) {
                                case 'closed':
                                    modelPath = "${modId}:block/${colorPrefix}fusuma_part_closed_${s}${flipStr}_x${px}_y${py}"
                                    break
                                case 'left_open':
                                    modelPath = (side == 'left')
                                        ? "${modId}:block/fusuma_part_invisible"
                                        : "${modId}:block/${colorPrefix}fusuma_part_overlap_sr${flipStr}_x${px}_y${py}"
                                    break
                                case 'right_open':
                                    modelPath = (side == 'right')
                                        ? "${modId}:block/fusuma_part_invisible"
                                        : "${modId}:block/${colorPrefix}fusuma_part_overlap_sl${flipStr}_x${px}_y${py}"
                                    break
                            }
                            def value = new LinkedHashMap()
                            value.model = modelPath
                            if (facing.y != null) value.y = facing.y
                            variants[key] = value
                        }
                    }
                }
            }
        }
    }
    writeJson(baseDir, "assets/${modId}/blockstates/${colorPrefix}fusuma_part.json", [variants: variants])
}

/** 襖アイテムモデル (models/item/{colorPrefix}fusuma.json) を生成 */
def generateFusumaItemModel(File baseDir, String modId, String colorPrefix = '', String texSuffix = '') {
    writeJson(baseDir, "assets/${modId}/models/item/${colorPrefix}fusuma.json", [
        parent: 'minecraft:item/generated',
        textures: [layer0: "${modId}:item/fusuma_item${texSuffix}"],
    ])
}

/** 襖アイテム定義 (items/{colorPrefix}fusuma.json) を生成 — 1.21+ のみ */
def generateFusumaItemDefinition(File baseDir, String modId, String colorPrefix = '') {
    writeJson(baseDir, "assets/${modId}/items/${colorPrefix}fusuma.json", [
        model: [type: 'minecraft:model', model: "${modId}:item/${colorPrefix}fusuma"],
    ])
}

// ── Lang 生成 ─────────────────────────────────────────
/**
 * 全色（デフォルト含む）の言語ファイルを生成する。
 */
def generateLangFiles(File baseDir, String modId, List tatamiColorList, List fusumaColorList) {
    def enMap = new LinkedHashMap()
    def jaMap = new LinkedHashMap()

    // 襖 (デフォルト)
    enMap["block.${modId}.fusuma_part"] = 'Fusuma'
    enMap["item.${modId}.fusuma"]       = 'Fusuma'

    jaMap["block.${modId}.fusuma_part"] = '襖'
    jaMap["item.${modId}.fusuma"]       = '襖'

    // 襖 カラーバリエーション
    fusumaColorList.each { color ->
        def prefix = "${color.id}_"
        enMap["block.${modId}.${prefix}fusuma_part"] = "${color.en} Fusuma"
        enMap["item.${modId}.${prefix}fusuma"]       = "${color.en} Fusuma"
        jaMap["block.${modId}.${prefix}fusuma_part"] = "${color.ja}襖"
        jaMap["item.${modId}.${prefix}fusuma"]       = "${color.ja}襖"
    }

    // デフォルト畳
    enMap["block.${modId}.tatami_part"]      = 'Tatami'
    enMap["item.${modId}.tatami"]            = 'Tatami'
    enMap["block.${modId}.tatami_half_part"] = 'Half Tatami'
    enMap["item.${modId}.tatami_half"]       = 'Half Tatami'

    jaMap["block.${modId}.tatami_part"]      = '畳'
    jaMap["item.${modId}.tatami"]            = '畳'
    jaMap["block.${modId}.tatami_half_part"] = '半畳'
    jaMap["item.${modId}.tatami_half"]       = '半畳'

    // 畳 カラーバリエーション
    tatamiColorList.each { color ->
        def prefix = "${color.id}_"

        enMap["block.${modId}.${prefix}tatami_part"]      = "${color.en} Tatami"
        enMap["item.${modId}.${prefix}tatami"]            = "${color.en} Tatami"
        enMap["block.${modId}.${prefix}tatami_half_part"] = "${color.en} Half Tatami"
        enMap["item.${modId}.${prefix}tatami_half"]       = "${color.en} Half Tatami"

        jaMap["block.${modId}.${prefix}tatami_part"]      = "${color.ja}畳"
        jaMap["item.${modId}.${prefix}tatami"]            = "${color.ja}畳"
        jaMap["block.${modId}.${prefix}tatami_half_part"] = "${color.ja}半畳"
        jaMap["item.${modId}.${prefix}tatami_half"]       = "${color.ja}半畳"
    }

    writeJson(baseDir, "assets/${modId}/lang/en_us.json", enMap)
    writeJson(baseDir, "assets/${modId}/lang/ja_jp.json", jaMap)
}

// ── メインタスク ──────────────────────────────────────
tasks.register('generateTatamiAssets') {
    description = 'Generates blockstate / model / item / loot-table / lang JSON files for all tatami color variants.'
    group = 'tatami'
    outputs.dir generatedDir

    doLast {
        def outDir = generatedDir.get().asFile
        // クリーンアップ（増分ビルドで古い色が残らないように）
        if (outDir.exists()) {
            outDir.deleteDir()
        }
        outDir.mkdirs()

        // ── 襖 (デフォルト) ──
        generateFusumaBlockstate(outDir, MOD_ID)
        generateFusumaInvisibleModel(outDir, MOD_ID)
        ['sl', 'sr'].each { s ->
            [false, true].each { flip ->
                [0, 1].each { px ->
                    [0, 1, 2].each { py ->
                        generateFusumaClosedModel(outDir, MOD_ID, '', s, flip, px, py)
                        generateFusumaOverlapModel(outDir, MOD_ID, '', s, flip, px, py)
                    }
                }
            }
        }
        generateFusumaItemModel(outDir, MOD_ID)
        if (!isLegacyFormat) {
            generateFusumaItemDefinition(outDir, MOD_ID)
        }
        generateLootTable(outDir, MOD_ID, '', 'fusuma_part', isLegacyFormat)

        // ── 襖 カラーバリエーション ──
        fusumaColors.each { color ->
            def prefix = "${color.id}_"
            def texSuffix = "_${color.id}"
            generateFusumaBlockstate(outDir, MOD_ID, prefix)
            ['sl', 'sr'].each { s ->
                [false, true].each { flip ->
                    [0, 1].each { px ->
                        [0, 1, 2].each { py ->
                            generateFusumaClosedModel(outDir, MOD_ID, prefix, s, flip, px, py, texSuffix)
                            generateFusumaOverlapModel(outDir, MOD_ID, prefix, s, flip, px, py, texSuffix)
                        }
                    }
                }
            }
            generateFusumaItemModel(outDir, MOD_ID, prefix, texSuffix)
            if (!isLegacyFormat) {
                generateFusumaItemDefinition(outDir, MOD_ID, prefix)
            }
            generateLootTable(outDir, MOD_ID, prefix, 'fusuma_part', isLegacyFormat)
        }

        // ── デフォルト（色なし）──
        generateBlockstate(outDir, MOD_ID, '', 'tatami_part', 8)
        generateBlockstate(outDir, MOD_ID, '', 'tatami_half_part', 4)

        ['tatami_part', 'tatami_half_part'].each { type ->
            generateBlockModel(outDir, MOD_ID, '', type, 'left', 270, '')
            generateBlockModel(outDir, MOD_ID, '', type, 'right', 90, '')
        }

        ['tatami', 'tatami_half'].each { itemType ->
            generateItemModel(outDir, MOD_ID, '', itemType, '')
            if (!isLegacyFormat) {
                generateItemDefinition(outDir, MOD_ID, '', itemType)
            }
        }

        ['tatami_part', 'tatami_half_part'].each { blockType ->
            generateLootTable(outDir, MOD_ID, '', blockType, isLegacyFormat)
        }

        // ── カラーバリエーション ──
        tatamiColors.each { color ->
            def prefix = "${color.id}_"
            def texSuffix = "_${color.id}"

            generateBlockstate(outDir, MOD_ID, prefix, 'tatami_part', 8)
            generateBlockstate(outDir, MOD_ID, prefix, 'tatami_half_part', 4)

            ['tatami_part', 'tatami_half_part'].each { type ->
                generateBlockModel(outDir, MOD_ID, prefix, type, 'left', 270, texSuffix)
                generateBlockModel(outDir, MOD_ID, prefix, type, 'right', 90, texSuffix)
            }

            ['tatami', 'tatami_half'].each { itemType ->
                generateItemModel(outDir, MOD_ID, prefix, itemType, texSuffix)
                if (!isLegacyFormat) {
                    generateItemDefinition(outDir, MOD_ID, prefix, itemType)
                }
            }

            ['tatami_part', 'tatami_half_part'].each { blockType ->
                generateLootTable(outDir, MOD_ID, prefix, blockType, isLegacyFormat)
            }
        }

        // ── 言語ファイル ──
        generateLangFiles(outDir, MOD_ID, tatamiColors, fusumaColors)

        // 生成数をログ出力
        def fileCount = 0
        outDir.eachFileRecurse { fileCount++ }
        logger.lifecycle("generateTatamiAssets: Generated ${fileCount} JSON files in ${outDir}")
    }
}

// 生成ディレクトリをリソースに追加
sourceSets.main.resources.srcDirs += generatedDir

// リソースを使うタスクの前に生成タスクを実行
tasks.named('processResources') {
    dependsOn 'generateTatamiAssets'
}
tasks.named('sourcesJar') {
    dependsOn 'generateTatamiAssets'
}
