import groovy.json.JsonOutput
import blocks.BlockRegistry

/**
 * 畳ブロックのカラーバリエーション用 JSON アセットをビルド時に自動生成する Gradle スクリプト。
 *
 * ブロック設定は buildSrc/src/main/kotlin/blocks/ 以下の各クラスで管理します。
 * 色を追加する場合は該当する Config クラスと
 * src/main/kotlin/com/showka/objects/TatamiColor.kt の両方を更新してください。
 */

def MOD_ID = 'tatamicraft'

// Detect MC version from project name for version-aware asset generation
def projectMcVersion = project.name.contains('-') ? project.name.replaceFirst(/^[^-]+-/, '') : ''
def mcMajor = projectMcVersion ? (projectMcVersion.tokenize('.').take(2).join('.') as BigDecimal) : 99
def isLegacyFormat = mcMajor < 1.21

// ── 出力先 ────────────────────────────────────────────
def generatedDir = layout.buildDirectory.dir('generated-tatami-resources')

// ── ユーティリティ ────────────────────────────────────
/** JSON をファイルに書き出す */
def writeJson(File baseDir, String relPath, Object data) {
    def file = new File(baseDir, relPath)
    file.parentFile.mkdirs()
    file.text = JsonOutput.prettyPrint(JsonOutput.toJson(data)) + '\n'
}

// ── Blockstate 生成 ───────────────────────────────────
/**
 * 畳パーツ (tatami_part / tatami_half_part) の blockstate JSON を生成する。
 *
 * @param partCount パーツ数 (tatami_part=8, tatami_half_part=4)
 */
def generateBlockstate(File baseDir, String modId, String prefix, String type, int partCount) {
    def variants = new LinkedHashMap()
    def facings = [
            [name: 'north', y: null],
            [name: 'east', y: 90],
            [name: 'south', y: 180],
            [name: 'west', y: 270],
    ]

    facings.each { facing ->
        [false, true].each { mirrored ->
            (0..<partCount).each { part ->
                def side
                if (part % 2 == 0) {
                    side = mirrored ? 'right' : 'left'
                } else {
                    side = mirrored ? 'left' : 'right'
                }

                def key = "facing=${facing.name},mirrored=${mirrored},part=${part}"
                def value = new LinkedHashMap()
                value.model = "${modId}:block/${prefix}${type}_${side}"
                if (facing.y != null) {
                    value.y = facing.y
                }
                variants[key] = value
            }
        }
    }

    writeJson(baseDir, "assets/${modId}/blockstates/${prefix}${type}.json", [variants: variants])
}

// ── Block Model 生成 ──────────────────────────────────
/**
 * 畳パーツの block model JSON を生成する。
 *
 * @param side "left" or "right"
 * @param rotation 上面テクスチャの回転角 (left=270, right=90)
 */
def generateBlockModel(File baseDir, String modId, String prefix, String type, String side, int rotation, String textureSuffix) {
    def texture = "${modId}:block/tatami_block${textureSuffix}"
    def data = new LinkedHashMap()
    data.textures = new LinkedHashMap([
            particle: texture,
            top     : texture,
            bottom  : texture,
            side    : texture,
    ])
    data.elements = [
            [
                    from : [0, 0, 0],
                    to   : [16, 1, 16],
                    faces: new LinkedHashMap([
                            down : [texture: '#bottom', cullface: 'down'],
                            up   : [texture: '#top', rotation: rotation],
                            north: [texture: '#side', cullface: 'north'],
                            south: [texture: '#side', cullface: 'south'],
                            west : [texture: '#side', cullface: 'west'],
                            east : [texture: '#side', cullface: 'east'],
                    ]),
            ]
    ]
    writeJson(baseDir, "assets/${modId}/models/block/${prefix}${type}_${side}.json", data)
}

// ── Item Model 生成 ───────────────────────────────────
/**
 * アイテムモデル JSON (models/item/) を生成する。
 *
 * @param itemType "tatami" or "tatami_half"
 */
def generateItemModel(File baseDir, String modId, String prefix, String itemType, String textureSuffix) {
    def textureName = (itemType == 'tatami') ? 'tatami_item' : 'tatami_half_item'
    def data = new LinkedHashMap([
            parent  : 'minecraft:item/generated',
            textures: [
                    layer0: "${modId}:item/${textureName}${textureSuffix}",
            ]
    ])
    writeJson(baseDir, "assets/${modId}/models/item/${prefix}${itemType}.json", data)
}

// ── Item Definition 生成 ──────────────────────────────
/**
 * アイテム定義 JSON (items/) を生成する。
 */
def generateItemDefinition(File baseDir, String modId, String prefix, String itemType) {
    def data = [
            model: [
                    type : 'minecraft:model',
                    model: "${modId}:item/${prefix}${itemType}",
            ]
    ]
    writeJson(baseDir, "assets/${modId}/items/${prefix}${itemType}.json", data)
}

// ── Loot Table 生成 ───────────────────────────────────
/**
 * ルートテーブル JSON を生成する（空プール — ドロップは Block コードで制御）。
 */
def generateLootTable(File baseDir, String modId, String prefix, String blockType, boolean legacy) {
    def data = new LinkedHashMap([
            type : 'minecraft:block',
            pools: [],
    ])
    def lootDir = legacy ? 'loot_tables' : 'loot_table'
    writeJson(baseDir, "data/${modId}/${lootDir}/blocks/${prefix}${blockType}.json", data)
}

// ── Fusuma 生成 ───────────────────────────────────────

/** channel の z 座標ペアを返す (inner=10..13, outer=13..16) */
def fusumaZRange(String s, boolean flip) {
    boolean outer = (s == 'sr' && !flip) || (s == 'sl' && flip)
    return outer ? [13, 16] : [10, 13]
}

/**
 * タイル位置 (s, px, py) に対応するテクスチャ名を返す。
 * 3種類のタイル:
 *   corner     (2辺フレーム、引手なし) — 上下行の全ポジション
 *   edge       (1辺フレーム+引手)     — 外列中段 (sl_x0_y1, sr_x1_y1)
 *   edge_plain (1辺フレーム、引手なし) — 内列中段 (sl_x1_y1, sr_x0_y1)
 */
def tileTexture(String modId, String texBase, String s, int px, int py, String texSuffix = '') {
    if (py != 1) return "${modId}:block/${texBase}_tile_corner${texSuffix}"
    boolean outer = (s == 'sl' && px == 0) || (s == 'sr' && px == 1)
    return outer ? "${modId}:block/${texBase}_tile_edge${texSuffix}"
            : "${modId}:block/${texBase}_tile_edge_plain${texSuffix}"
}

/**
 * タイル位置 (s, px, py) に対する south フェースの UV 回転角 (0/90/180/270°) を返す。
 *
 * Minecraft UV rotation の変換則 (rotation: 90 → UV を 90°CW 回転):
 *   face-TOP   ← texture-LEFT
 *   face-RIGHT ← texture-TOP
 *   face-BOTTOM← texture-RIGHT
 *   face-LEFT  ← texture-BOTTOM
 *
 * corner テクスチャ: フレームが TOP+LEFT にある
 *   0°→TL, 90°→TR, 180°→BR, 270°→BL
 * edge テクスチャ: フレームが LEFT にある
 *   0°→LEFT, 90°→TOP, 180°→RIGHT, 270°→BOTTOM
 */
def fusumaRotForTile(String s, int px, int py) {
    if (py == 2) {
        // 上行: px=0→TL(0°), px=1→TR(90°)
        return (px == 0) ? 0 : 90
    } else if (py == 0) {
        // 下行: px=0→BL(270°), px=1→BR(180°)
        return (px == 0) ? 270 : 180
    } else {
        // 中段
        if (s == 'sl' && px == 0) return 0    // 左外辺 (引手)
        if (s == 'sl' && px == 1) return 180  // 右内仕切り
        if (s == 'sr' && px == 0) return 0    // 左内仕切り
        return 180                             // 右外辺 (引手)
    }
}

/** 全フェース定義を生成。south の UV 回転角を受け取り north は対称的に補正する。 */
def fusumaFaces(String frontKey, String backKey, int southRot) {
    int northRot = (360 - southRot) % 360
    def southFace = new LinkedHashMap([texture: "#${frontKey}", uv: [0, 0, 16, 16]])
    if (southRot != 0) southFace.rotation = southRot
    def northFace = new LinkedHashMap([texture: "#${backKey}", uv: [16, 0, 0, 16]])
    if (northRot != 0) northFace.rotation = northRot
    return new LinkedHashMap([
            north: northFace,
            south: southFace,
            east : [texture: '#edge', uv: [0, 0, 3, 16]],
            west : [texture: '#edge', uv: [0, 0, 3, 16]],
            up   : [texture: '#edge', uv: [0, 0, 16, 3]],
            down : [texture: '#edge', uv: [0, 0, 16, 3]],
    ])
}

/**
 * スライドパネル1バリアント分の closed/overlap モデル (48ファイル) を生成。
 * opts: partId (必須), texBase='fusuma', texSuffix='', renderType=null, outerEdgeOnly=false
 */
def generateSlidingPanelModels(File baseDir, String modId, Map opts = [:]) {
    String partId         = opts.partId
    String texBase        = opts.texBase       ?: 'fusuma'
    String texSuffix      = opts.texSuffix     ?: ''
    String renderType     = opts.renderType    ?: null
    boolean outerEdgeOnly = opts.outerEdgeOnly ?: false

    ['sl', 'sr'].each { s ->
        [false, true].each { flip ->
            [0, 1].each { px ->
                [0, 1, 2].each { py ->
                    def z       = fusumaZRange(s, flip)
                    def flipStr = flip ? '_flip' : ''
                    def tex     = tileTexture(modId, texBase, s, px, py, texSuffix)
                    def rot     = fusumaRotForTile(s, px, py)

                    Closure buildFaces = { String fk, String bk, int frot, String fs, int fpx, int fpy ->
                        def allF = fusumaFaces(fk, bk, frot)
                        if (!outerEdgeOnly) return allF
                        def f = new LinkedHashMap([north: allF.north, south: allF.south])
                        if (fs == 'sl' && fpx == 0) f.west = [texture: "#${fk}", uv: [0, 0, 2, 16]]
                        if (fs == 'sl' && fpx == 1) f.east = [texture: "#${fk}", uv: [0, 0, 2, 16]]
                        if (fs == 'sr' && fpx == 1) f.east = [texture: "#${fk}", uv: [0, 0, 2, 16]]
                        if (fs == 'sr' && fpx == 0) f.west = [texture: "#${fk}", uv: [0, 0, 2, 16]]
                        if (fpy == 2) f.up   = [texture: "#${fk}", uv: [0, 0, 16, 2]]
                        if (fpy == 0) f.down = [texture: "#${fk}", uv: [0, 0, 16, 2]]
                        return f
                    }

                    def edgeEntry = outerEdgeOnly ? [:] : [edge: "${modId}:block/fusuma_edge"]

                    // closed model
                    def closed = new LinkedHashMap([
                            textures: new LinkedHashMap([particle: tex, front: tex, back: tex] + edgeEntry),
                            elements: [[from: [0, 0, z[0]], to: [16, 16, z[1]], faces: buildFaces('front', 'back', rot, s, px, py)]],
                    ])
                    if (renderType) closed.render_type = renderType
                    writeJson(baseDir, "assets/${modId}/models/block/${partId}_closed_${s}${flipStr}_x${px}_y${py}.json", closed)

                    // overlap model
                    def other    = (s == 'sl') ? 'sr' : 'sl'
                    def otherZ   = (z[0] == 10) ? [13, 16] : [10, 13]
                    def xOff     = (s == 'sl') ? 4 : -4
                    def otherTex = tileTexture(modId, texBase, other, px, py, texSuffix)
                    def otherRot = fusumaRotForTile(other, px, py)
                    def overlap = new LinkedHashMap([
                            textures: new LinkedHashMap([particle: tex, front_l: tex, back_l: tex, front_r: otherTex, back_r: otherTex] + edgeEntry),
                            elements: [
                                    [from: [0, 0, z[0]],         to: [16, 16, z[1]],          faces: buildFaces('front_l', 'back_l', rot, s, px, py)],
                                    [from: [xOff, 0, otherZ[0]], to: [xOff + 16, 16, otherZ[1]], faces: buildFaces('front_r', 'back_r', otherRot, other, px, py)],
                            ],
                    ])
                    if (renderType) overlap.render_type = renderType
                    writeJson(baseDir, "assets/${modId}/models/block/${partId}_overlap_${s}${flipStr}_x${px}_y${py}.json", overlap)
                }
            }
        }
    }
}

/** 不可視モデル (fusuma_part_invisible.json) を生成 */
def generateFusumaInvisibleModel(File baseDir, String modId) {
    writeJson(baseDir, "assets/${modId}/models/block/fusuma_part_invisible.json", [elements: []])
}

/** 任意のスライドパネルブロック用 288バリアントマップを返す */
def buildSlidingBlockstateVariants(String modId, String partId) {
    def variants = new LinkedHashMap()
    def facings = [
            [name: 'north', y: null],
            [name: 'east', y: 90],
            [name: 'south', y: 180],
            [name: 'west', y: 270],
    ]
    ['left', 'right'].each { side ->
        def s = (side == 'left') ? 'sl' : 'sr'
        facings.each { facing ->
            [false, true].each { flipped ->
                def flipStr = flipped ? '_flip' : ''
                [0, 1].each { px ->
                    [0, 1, 2].each { py ->
                        ['closed', 'left_open', 'right_open'].each { ds ->
                            def key = "door_state=${ds},facing=${facing.name},flipped_horizontal=${flipped},part_x=${px},part_y=${py},side=${side}"
                            String modelPath
                            switch (ds) {
                                case 'closed':
                                    modelPath = "${modId}:block/${partId}_closed_${s}${flipStr}_x${px}_y${py}"
                                    break
                                case 'left_open':
                                    modelPath = (side == 'left')
                                            ? "${modId}:block/fusuma_part_invisible"
                                            : "${modId}:block/${partId}_overlap_sr${flipStr}_x${px}_y${py}"
                                    break
                                case 'right_open':
                                    modelPath = (side == 'right')
                                            ? "${modId}:block/fusuma_part_invisible"
                                            : "${modId}:block/${partId}_overlap_sl${flipStr}_x${px}_y${py}"
                                    break
                            }
                            def value = new LinkedHashMap()
                            value.model = modelPath
                            if (facing.y != null) value.y = facing.y
                            variants[key] = value
                        }
                    }
                }
            }
        }
    }
    return variants
}

/** 襖アイテムモデル (models/item/{itemId}.json) を生成 */
def generateFusumaItemModel(File baseDir, String modId, String itemId, String texSuffix = '') {
    writeJson(baseDir, "assets/${modId}/models/item/${itemId}.json", [
            parent  : 'minecraft:item/generated',
            textures: [layer0: "${modId}:item/fusuma_item${texSuffix}"],
    ])
}

/** 襖アイテム定義 (items/{itemId}.json) を生成 — 1.21+ のみ */
def generateFusumaItemDefinition(File baseDir, String modId, String itemId) {
    writeJson(baseDir, "assets/${modId}/items/${itemId}.json", [
            model: [type: 'minecraft:model', model: "${modId}:item/${itemId}"],
    ])
}

// ── 派生スライドドア生成 ────────────────────────────────

/**
 * 派生スライドドアブロックの全アセットを生成する。
 * blockstate / closed models / overlap models / item model / item definition / loot table
 */
def generateSlidingDoorVariant(File outDir, String modId, cfg, boolean isLegacy) {
    writeJson(outDir, "assets/${modId}/blockstates/${cfg.blockPartId}.json",
              [variants: buildSlidingBlockstateVariants(modId, cfg.blockPartId)])
    generateSlidingPanelModels(outDir, modId, [
            partId       : cfg.blockPartId,
            texBase      : cfg.texBase,
            renderType   : cfg.renderType,
            outerEdgeOnly: cfg.outerEdgeOnly,
    ])
    writeJson(outDir, "assets/${modId}/models/item/${cfg.itemId}.json", [
            parent  : 'minecraft:item/generated',
            textures: [layer0: "${modId}:item/${cfg.itemId}_item"],
    ])
    if (!isLegacy) {
        writeJson(outDir, "assets/${modId}/items/${cfg.itemId}.json", [
                model: [type: 'minecraft:model', model: "${modId}:item/${cfg.itemId}"],
        ])
    }
    def lootDir = isLegacy ? 'loot_tables' : 'loot_table'
    writeJson(outDir, "data/${modId}/${lootDir}/blocks/${cfg.blockPartId}.json",
              [type: 'minecraft:block', pools: []])
}

// ── Lang 生成 ─────────────────────────────────────────
/**
 * 全色（デフォルト含む）の言語ファイルを生成する。
 */
def generateLangFiles(File baseDir, String modId, List tatamiSeries, List fusumaSeries, List slidingDoors) {
    def enMap = new LinkedHashMap()
    def jaMap = new LinkedHashMap()

    // 全スライドパネル（襖シリーズ + 派生スライドドア）
    (fusumaSeries + slidingDoors).each { cfg ->
        enMap["block.${modId}.${cfg.blockPartId}"] = cfg.enName
        enMap["item.${modId}.${cfg.itemId}"]       = cfg.enName
        jaMap["block.${modId}.${cfg.blockPartId}"] = cfg.jaName
        jaMap["item.${modId}.${cfg.itemId}"]       = cfg.jaName
    }

    // 畳シリーズ
    tatamiSeries.each { cfg ->
        enMap["block.${modId}.${cfg.prefix}tatami_part"]      = "${cfg.enPrefix}Tatami"
        enMap["item.${modId}.${cfg.prefix}tatami"]            = "${cfg.enPrefix}Tatami"
        enMap["block.${modId}.${cfg.prefix}tatami_half_part"] = "${cfg.enPrefix}Half Tatami"
        enMap["item.${modId}.${cfg.prefix}tatami_half"]       = "${cfg.enPrefix}Half Tatami"

        jaMap["block.${modId}.${cfg.prefix}tatami_part"]      = "${cfg.jaPrefix}畳"
        jaMap["item.${modId}.${cfg.prefix}tatami"]            = "${cfg.jaPrefix}畳"
        jaMap["block.${modId}.${cfg.prefix}tatami_half_part"] = "${cfg.jaPrefix}半畳"
        jaMap["item.${modId}.${cfg.prefix}tatami_half"]       = "${cfg.jaPrefix}半畳"
    }

    writeJson(baseDir, "assets/${modId}/lang/en_us.json", enMap)
    writeJson(baseDir, "assets/${modId}/lang/ja_jp.json", jaMap)
}

// ── メインタスク ──────────────────────────────────────
tasks.register('generateTatamiAssets') {
    description = 'Generates blockstate / model / item / loot-table / lang JSON files for all tatami color variants.'
    group = 'tatami'
    outputs.dir generatedDir

    doLast {
        def outDir = generatedDir.get().asFile
        // クリーンアップ（増分ビルドで古い色が残らないように）
        if (outDir.exists()) {
            outDir.deleteDir()
        }
        outDir.mkdirs()

        def registry = BlockRegistry.INSTANCE

        // ── 襖シリーズ ──
        generateFusumaInvisibleModel(outDir, MOD_ID)
        registry.fusumaSeries.each { cfg ->
            writeJson(outDir, "assets/${MOD_ID}/blockstates/${cfg.blockPartId}.json",
                      [variants: buildSlidingBlockstateVariants(MOD_ID, cfg.blockPartId)])
            generateSlidingPanelModels(outDir, MOD_ID, [
                    partId       : cfg.blockPartId,
                    texBase      : cfg.texBase,
                    texSuffix    : cfg.texSuffix,
                    renderType   : cfg.renderType,
                    outerEdgeOnly: cfg.outerEdgeOnly,
            ])
            generateFusumaItemModel(outDir, MOD_ID, cfg.itemId, cfg.texSuffix)
            if (!isLegacyFormat) generateFusumaItemDefinition(outDir, MOD_ID, cfg.itemId)
            generateLootTable(outDir, MOD_ID, '', cfg.blockPartId, isLegacyFormat)
        }

        // ── 派生スライドドア ──
        registry.slidingDoors.each { cfg ->
            generateSlidingDoorVariant(outDir, MOD_ID, cfg, isLegacyFormat)
        }

        // ── 畳シリーズ ──
        registry.tatamiSeries.each { cfg ->
            ['tatami_part', 'tatami_half_part'].each { type ->
                generateBlockstate(outDir, MOD_ID, cfg.prefix, type, type == 'tatami_part' ? 8 : 4)
                generateBlockModel(outDir, MOD_ID, cfg.prefix, type, 'left', 270, cfg.texSuffix)
                generateBlockModel(outDir, MOD_ID, cfg.prefix, type, 'right', 90, cfg.texSuffix)
                generateLootTable(outDir, MOD_ID, cfg.prefix, type, isLegacyFormat)
            }
            ['tatami', 'tatami_half'].each { itemType ->
                generateItemModel(outDir, MOD_ID, cfg.prefix, itemType, cfg.texSuffix)
                if (!isLegacyFormat) generateItemDefinition(outDir, MOD_ID, cfg.prefix, itemType)
            }
        }

        // ── 言語ファイル ──
        generateLangFiles(outDir, MOD_ID, registry.tatamiSeries, registry.fusumaSeries, registry.slidingDoors)

        // 生成数をログ出力
        def fileCount = 0
        outDir.eachFileRecurse { fileCount++ }
        logger.lifecycle("generateTatamiAssets: Generated ${fileCount} JSON files in ${outDir}")
    }
}

// 生成ディレクトリをリソースに追加
sourceSets.main.resources.srcDirs += generatedDir

// リソースを使うタスクの前に生成タスクを実行
tasks.named('processResources') {
    dependsOn 'generateTatamiAssets'
}
tasks.named('sourcesJar') {
    dependsOn 'generateTatamiAssets'
}
