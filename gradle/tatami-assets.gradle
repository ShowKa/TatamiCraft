import groovy.json.JsonOutput
import blocks.BlockRegistry

/**
 * 畳ブロックのカラーバリエーション用 JSON アセットをビルド時に自動生成する Gradle スクリプト。
 *
 * ブロック設定は buildSrc/src/main/kotlin/blocks/ 以下の各クラスで管理します。
 * 色を追加する場合は該当する Config クラスと
 * src/main/kotlin/com/showka/objects/TatamiColor.kt の両方を更新してください。
 */

def MOD_ID = 'tatamicraft'

// Detect MC version from project name for version-aware asset generation
def projectMcVersion = project.name.contains('-') ? project.name.replaceFirst(/^[^-]+-/, '') : ''
def mcMajor = projectMcVersion ? (projectMcVersion.tokenize('.').take(2).join('.') as BigDecimal) : 99
def isLegacyFormat = mcMajor < 1.21

// ── 出力先 ────────────────────────────────────────────
def generatedDir = layout.buildDirectory.dir('generated-tatami-resources')

// ── ユーティリティ ────────────────────────────────────
/** JSON をファイルに書き出す */
def writeJson(File baseDir, String relPath, Object data) {
    def file = new File(baseDir, relPath)
    file.parentFile.mkdirs()
    file.text = JsonOutput.prettyPrint(JsonOutput.toJson(data)) + '\n'
}

// ── メインタスク ──────────────────────────────────────
tasks.register('generateTatamiAssets') {
    description = 'Generates blockstate / model / item / loot-table / lang JSON files for all tatami color variants.'
    group = 'tatami'
    outputs.dir generatedDir

    doLast {
        def outDir = generatedDir.get().asFile
        // クリーンアップ（増分ビルドで古い色が残らないように）
        if (outDir.exists()) {
            outDir.deleteDir()
        }
        outDir.mkdirs()

        def registry = BlockRegistry.INSTANCE

        // ── アセットファイル生成 ──
        registry.allConfigs.each { cfg ->
            cfg.assetEntries(MOD_ID, isLegacyFormat).each { entry ->
                writeJson(outDir, entry.path, entry.data)
            }
        }

        // ── 言語ファイル生成 ──
        def enMap = new LinkedHashMap()
        def jaMap = new LinkedHashMap()
        registry.allConfigs.each { cfg ->
            cfg.langEntries(MOD_ID).each { entry ->
                enMap[entry.key] = entry.en
                jaMap[entry.key] = entry.ja
            }
        }
        writeJson(outDir, "assets/${MOD_ID}/lang/en_us.json", enMap)
        writeJson(outDir, "assets/${MOD_ID}/lang/ja_jp.json", jaMap)

        // 生成数をログ出力
        def fileCount = 0
        outDir.eachFileRecurse { fileCount++ }
        logger.lifecycle("generateTatamiAssets: Generated ${fileCount} JSON files in ${outDir}")
    }
}

// 生成ディレクトリをリソースに追加
sourceSets.main.resources.srcDirs += generatedDir

// リソースを使うタスクの前に生成タスクを実行
tasks.named('processResources') {
    dependsOn 'generateTatamiAssets'
}
tasks.named('sourcesJar') {
    dependsOn 'generateTatamiAssets'
}
